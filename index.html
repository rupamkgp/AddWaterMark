<!DOCTYPE html>
<html lang="en" class="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AddWatermark - Pro Camera Watermarks</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        gray: {
                            850: '#1f2937',
                            900: '#111827',
                            950: '#030712',
                        }
                    }
                }
            }
        }
    </script>
    <!-- Custom CSS -->
    <link rel="stylesheet" href="styles.css">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body
    class="bg-gray-50 dark:bg-gray-950 text-gray-900 dark:text-gray-100 min-h-screen flex flex-col font-sans transition-colors duration-200">

    <!-- Header -->
    <header
        class="sticky top-0 z-50 w-full border-b border-gray-200 dark:border-gray-800 bg-white/80 dark:bg-gray-950/80 backdrop-blur-md">
        <div class="container mx-auto px-4 h-16 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 rounded-lg bg-blue-600 flex items-center justify-center text-white">
                    <i data-lucide="camera" class="w-5 h-5"></i>
                </div>
                <div class="flex flex-col">
                    <span class="font-bold text-lg leading-tight">AddWatermark</span>
                    <span class="text-xs text-gray-500 dark:text-gray-400 hidden sm:block">Make photos look shot on any
                        phone</span>
                </div>
            </div>

            <div class="flex items-center gap-4">
                <button id="theme-toggle"
                    class="p-2 rounded-full hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors">
                    <i data-lucide="moon" class="w-5 h-5 dark:hidden"></i>
                    <i data-lucide="sun" class="w-5 h-5 hidden dark:block"></i>
                </button>
                <button
                    class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg font-medium transition-colors text-sm">
                    Go Pro ($5/mo)
                </button>
            </div>
        </div>
    </header>

    <!-- Main Workspace -->
    <main class="flex-grow flex flex-col lg:flex-row overflow-hidden h-[calc(100vh-4rem)]">

        <!-- Left Sidebar: Tools & Library -->
        <aside
            class="w-full lg:w-80 border-r border-gray-200 dark:border-gray-800 bg-white dark:bg-gray-900 overflow-y-auto hidden lg:flex flex-col flex-shrink-0">
            <div class="p-4 border-b border-gray-200 dark:border-gray-800">
                <h2 class="font-semibold mb-4">Device Library</h2>

                <div class="relative">
                    <i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400"></i>
                    <input type="text" id="device-search" placeholder="Search devices..."
                        class="w-full pl-9 pr-4 py-2 bg-gray-100 dark:bg-gray-800 border border-transparent focus:border-blue-500 focus:bg-white dark:focus:bg-gray-900 rounded-lg outline-none transition-all text-sm">
                </div>
            </div>

            <div class="flex-grow p-4 overflow-y-auto" id="device-list-container">
                <!-- Device categories and items will be injected here by JS -->
            </div>
        </aside>

        <!-- Center: Canvas / Workspace -->
        <div class="flex-grow bg-gray-100 dark:bg-gray-950 relative flex flex-col min-w-0">

            <!-- Upload Overlay -->
            <div id="upload-overlay"
                class="absolute inset-0 z-10 p-6 flex items-center justify-center bg-gray-50 dark:bg-gray-900">
                <div class="max-w-md w-full">
                    <div id="drop-zone"
                        class="border-2 border-dashed border-gray-300 dark:border-gray-700 rounded-2xl p-12 text-center bg-white dark:bg-gray-800 hover:border-blue-500 dark:hover:border-blue-500 hover:bg-blue-50 dark:hover:bg-blue-900/20 transition-all cursor-pointer group">
                        <div
                            class="w-16 h-16 bg-blue-100 dark:bg-blue-900/50 text-blue-600 dark:text-blue-400 rounded-full flex items-center justify-center mx-auto mb-4 group-hover:scale-110 transition-transform">
                            <i data-lucide="upload-cloud" class="w-8 h-8"></i>
                        </div>
                        <h3 class="text-xl font-semibold mb-2">Upload your photo</h3>
                        <p class="text-sm text-gray-500 dark:text-gray-400 mb-6">Drag and drop your image here, or click
                            to browse. Max 10MB (JPG, PNG)</p>
                        <button
                            class="bg-gray-900 dark:bg-white text-white dark:text-gray-900 px-6 py-2 rounded-lg font-medium shadow-sm hover:shadow-md transition-all">
                            Browse Files
                        </button>
                        <input type="file" id="file-input" class="hidden" accept="image/jpeg, image/png, image/jpg">
                    </div>

                    <!-- Landing Page Features (Only visible before upload) -->
                    <div class="mt-12 grid grid-cols-2 gap-4 text-center">
                        <div
                            class="p-4 rounded-xl bg-white dark:bg-gray-800 shadow-sm border border-gray-100 dark:border-gray-700">
                            <i data-lucide="smartphone" class="w-6 h-6 mx-auto mb-2 text-blue-500"></i>
                            <h4 class="font-medium text-sm">100+ Devices</h4>
                            <p class="text-xs text-gray-500 dark:text-gray-400 mt-1">iPhone, Samsung, Pixel</p>
                        </div>
                        <div
                            class="p-4 rounded-xl bg-white dark:bg-gray-800 shadow-sm border border-gray-100 dark:border-gray-700">
                            <i data-lucide="zap" class="w-6 h-6 mx-auto mb-2 text-amber-500"></i>
                            <h4 class="font-medium text-sm">Instant Preview</h4>
                            <p class="text-xs text-gray-500 dark:text-gray-400 mt-1">Real-time rendering</p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Canvas Container -->
            <div id="workspace-container"
                class="hidden flex-grow relative overflow-auto p-4 md:p-8 flex items-center justify-center">
                <canvas id="preview-canvas" class="max-w-full max-h-full object-contain shadow-xl rounded-sm"></canvas>
            </div>

            <!-- Mobile Toggle Bar -->
            <div id="mobile-controls-bar"
                class="hidden lg:hidden border-t border-gray-200 dark:border-gray-800 bg-white dark:bg-gray-900 p-2 flex justify-around">
                <button class="p-2 flex flex-col items-center text-blue-600">
                    <i data-lucide="smartphone" class="w-5 h-5"></i>
                    <span class="text-[10px] mt-1 font-medium">Device</span>
                </button>
                <button class="p-2 flex flex-col items-center text-gray-500 dark:text-gray-400">
                    <i data-lucide="sliders" class="w-5 h-5"></i>
                    <span class="text-[10px] mt-1 font-medium">Adjust</span>
                </button>
            </div>
        </div>

        <!-- Right Sidebar: Settings & Export -->
        <aside
            class="w-full lg:w-80 border-l border-gray-200 dark:border-gray-800 bg-white dark:bg-gray-900 overflow-y-auto hidden lg:flex flex-col flex-shrink-0">

            <div class="p-4 border-b border-gray-200 dark:border-gray-800">
                <h2 class="font-semibold mb-4 text-sm uppercase tracking-wider text-gray-500">Watermark Controls</h2>

                <!-- Custom Text -->
                <div class="mb-6">
                    <label class="block text-sm font-medium mb-1">Owner Name</label>
                    <input type="text" id="owner-name" placeholder="E.g. Ajay" value="Owner"
                        class="w-full px-3 py-2 bg-gray-50 dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-lg text-sm focus:ring-blue-500 focus:border-blue-500 outline-none transition-colors">
                </div>

                <!-- Position -->
                <div class="mb-6">
                    <label class="block text-sm font-medium mb-2">Position</label>
                    <div class="grid grid-cols-2 gap-2">
                        <button
                            class="p-2 border border-blue-500 bg-blue-50 dark:bg-blue-900/20 text-blue-600 dark:text-blue-400 rounded-lg flex items-center justify-center gap-2 text-sm font-medium transition-colors"
                            data-pos="bottom-left">
                            <i data-lucide="align-start-vertical" class="w-4 h-4"></i> Bottom L
                        </button>
                        <button
                            class="p-2 border border-gray-200 dark:border-gray-700 hover:bg-gray-50 dark:hover:bg-gray-800 rounded-lg flex items-center justify-center gap-2 text-sm font-medium transition-colors"
                            data-pos="bottom-right">
                            <i data-lucide="align-end-vertical" class="w-4 h-4"></i> Bottom R
                        </button>
                        <button
                            class="p-2 border border-gray-200 dark:border-gray-700 hover:bg-gray-50 dark:hover:bg-gray-800 rounded-lg flex items-center justify-center gap-2 text-sm font-medium transition-colors"
                            data-pos="top-left">
                            <i data-lucide="arrow-up-left" class="w-4 h-4"></i> Top L
                        </button>
                        <button
                            class="p-2 border border-gray-200 dark:border-gray-700 hover:bg-gray-50 dark:hover:bg-gray-800 rounded-lg flex items-center justify-center gap-2 text-sm font-medium transition-colors"
                            data-pos="top-right">
                            <i data-lucide="arrow-up-right" class="w-4 h-4"></i> Top R
                        </button>
                    </div>
                </div>

                <!-- Sliders -->
                <div class="space-y-4">
                    <div>
                        <div class="flex justify-between mb-1">
                            <label class="text-sm font-medium">Size</label>
                            <span class="text-xs text-gray-500" id="size-val">50%</span>
                        </div>
                        <input type="range" id="param-size" min="10" max="100" value="50"
                            class="w-full accent-blue-600">
                    </div>

                    <div>
                        <div class="flex justify-between mb-1">
                            <label class="text-sm font-medium">Margin</label>
                            <span class="text-xs text-gray-500" id="margin-val">40px</span>
                        </div>
                        <input type="range" id="param-margin" min="0" max="200" value="40"
                            class="w-full accent-blue-600">
                    </div>

                    <div>
                        <div class="flex justify-between mb-1">
                            <label class="text-sm font-medium">Opacity</label>
                            <span class="text-xs text-gray-500" id="opacity-val">100%</span>
                        </div>
                        <input type="range" id="param-opacity" min="10" max="100" value="100"
                            class="w-full accent-blue-600">
                    </div>
                </div>
            </div>

            <!-- Export -->
            <div class="p-4 mt-auto border-t border-gray-200 dark:border-gray-800 bg-gray-50 dark:bg-gray-900">
                <div class="flex justify-between text-sm mb-4">
                    <span class="text-gray-500">Exports remaining today:</span>
                    <span class="font-medium text-green-600 dark:text-green-400">5/5</span>
                </div>

                <div class="flex gap-2">
                    <select id="export-format"
                        class="bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-1/3 p-2.5 outline-none">
                        <option value="jpeg">JPG</option>
                        <option value="png">PNG</option>
                    </select>
                    <button id="btn-export"
                        class="flex-grow bg-blue-600 hover:bg-blue-700 text-white font-medium rounded-lg text-sm px-5 py-2.5 flex items-center justify-center gap-2 transition-colors disabled:opacity-50 disabled:cursor-not-allowed"
                        disabled>
                        <i data-lucide="download" class="w-4 h-4"></i>
                        Download HD
                    </button>
                </div>
            </div>

        </aside>

    </main>

    <script src="devices.js"></script>
    <script src="canvas.js"></script>
    <script src="app.js"></script>
    <script>
        // Initialize Lucide icons
        lucide.createIcons();
    </script>
</body>

</html>
